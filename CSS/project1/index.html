<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Contact Form</h1>
            <p>Please fill all the texts in the fields.</p>
        </div>

        <form class="contact-form" action="submit">
            <label>Your Name :</label>
            <input type="text" placeholder="Your Full Name">

            <label>Your Email :</label>
            <input type="email" placeholder="Valid Email Address">

            <label>Message :</label>
            <textarea placeholder="Your Message to Us"></textarea>

            <label>Subject :</label>
            <input type="text" placeholder="Job Inquiry">

            <button type="submit">Send</button>
        </form>
    </div>

</body>
</html>
