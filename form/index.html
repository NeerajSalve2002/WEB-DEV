<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neeraj Salve</title>
</head>

<body>
    <form action="post">
        <h1>Registration form</h1>
        <!-- Username -->
        <div>
            <label for="username"> USERNAME: </label>
            <input type="text" id="username" name="USERNAME" placeholder="ENTER YOUR USERNAME " />
        </div>
        <!-- Radio -->
        <div>
            <input type="radio" id="male" name="Gender" value="male">
            <label for="male">Male</label>

            <input type="radio" id="female" name="Gender" value="female">
            <label for="female">Female</label>
        </div>
        <!-- Checkboxs -->
        <h2>TODO List </h2>
        <div>
            <input type="checkbox" name="todo" id="eat">
            <label for="eat">Eat</label>
            <input type="checkbox" name="todo" id="sleep">
            <label for="sleep">Sleep</label>
            <input type="checkbox" name="todo" id="study">
            <label for="study">Study</label>
        </div>
        <!-- textareas -->
         <div>
             <label for="comment">Comments</label>
            <textarea name="Comment" id="comment" rows="4" cols="50"> Enter your comments here...
            </textarea>
         </div>
         <!-- select tag -->
         <div>
              <label for="fruit">Select fruit: </label>
            <select name="fruit" id="fruit">
                <option value="apple">APPLE</option>
                <option value="banana">BANANA</option>
                <option value="cherry">CHERRY</option>
            </select>
          </div>



    </form>
</body>

</html>
